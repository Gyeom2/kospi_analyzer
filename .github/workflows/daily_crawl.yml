name: Daily KOSPI Update

on:
  schedule:
    - cron: '0 12 * * *' # 매일 한국 시간 오후 9시
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install pandas numpy pyarrow pykrx workalendar

    - name: Setup Rclone
      uses: rclone/rclone-action@v1

    - name: Configure Rclone
      run: |
        mkdir -p ~/.config/rclone
        cat << EOF > ~/.config/rclone/rclone.conf
        [gdrive]
        type = drive
        scope = drive
        token = ${{ secrets.RCLONE_CONFIG_TOKEN }}
        EOF

    - name: Download existing data from GDrive
      run: |
        # 구글 드라이브에서 기존 데이터를 먼저 가져옵니다. 
        # 폴더가 없어도 에러가 나지 않도록 처리합니다.
        rclone copy gdrive:StockData/kospi_db ./kospi_db || echo "No existing data found"

    - name: Run Update Script
      env:
        KRX_ID: ${{ secrets.KRX_ID }}
        KRX_PW: ${{ secrets.KRX_PW }}
      run: |
        # 업로드하신 daily_update.py의 TARGET_DB 변수가 'kospi_db' 폴더를 가리키는지 확인하세요.
        python daily_update.py

    - name: Sync back to Google Drive
      run: |
        # 수집된 최신 데이터를 구글 드라이브에 동기화(업로드)합니다.
        rclone sync ./kospi_db gdrive:StockData/kospi_db --drive-use-trash=false